sonar.projectKey=Finfinder_AgentDeck
sonar.organization=finfinder

sonar.sources=apps,packages
sonar.tests=tests
sonar.inclusions=**/*.ts,**/*.tsx
sonar.test.inclusions=tests/**/*.ts,tests/**/*.tsx
sonar.exclusions=**/node_modules/**,coverage/**,**/coverage/**,dist/**,**/dist/**,out/**,**/out/**,.vite/**,**/.vite/**,**/*.d.ts,**/*.config.js,**/*.config.cjs,**/*.config.mjs,**/*.config.ts
sonar.coverage.exclusions=tests/**,**/*.test.ts,**/*.test.tsx,**/*.d.ts,**/*.config.js,**/*.config.cjs,**/*.config.mjs,**/*.config.ts,apps/desktop/src/main/**,apps/desktop/src/preload/**,packages/**/src/index.ts,packages/workbench/src/main.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Disable S6766 (JSX special characters must be escaped) - not applicable to JSX/TSX
# where > and } are valid syntax, not HTML entities
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6766
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.tsx
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S6747
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.tsx