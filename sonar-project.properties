sonar.projectKey=Finfinder_AgentDeck
sonar.organization=finfinder

sonar.sources=apps,packages
sonar.tests=tests
sonar.inclusions=**/*.ts,**/*.tsx
sonar.test.inclusions=tests/**/*.ts,tests/**/*.tsx
sonar.exclusions=**/node_modules/**,coverage/**,**/coverage/**,dist/**,**/dist/**,out/**,**/out/**,.vite/**,**/.vite/**,**/*.d.ts,**/*.config.js,**/*.config.cjs,**/*.config.mjs,**/*.config.ts
sonar.coverage.exclusions=tests/**,**/*.test.ts,**/*.test.tsx,**/*.d.ts,**/*.config.js,**/*.config.cjs,**/*.config.mjs,**/*.config.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8