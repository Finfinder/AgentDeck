name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - '*.*.*'
  pull_request:
    branches:
      - main
      - '*.*.*'

permissions: {}

jobs:
  sonar:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify peer dependencies
        run: |
          echo "Checking peer dependency consistency..."
          NPM_OUTPUT=$(npm ls --all 2>&1)
          NPM_EXIT=$?

          # Check for actual peer dependency conflicts (ERESOLVE, unmet peer deps)
          # Ignore "UNMET OPTIONAL DEPENDENCY" which is normal for platform-specific optional deps
          if echo "$NPM_OUTPUT" | grep -qE "(ERESOLVE|peer dep missing|unmet peer)"; then
            echo "::error::Peer dependency conflicts detected!"
            echo "$NPM_OUTPUT"
            exit 1
          elif [ "$NPM_EXIT" -ne 0 ]; then
            echo "::error::npm ls failed (exit $NPM_EXIT) for unknown reason"
            echo "$NPM_OUTPUT"
            exit 1
          else
            echo "Peer dependencies OK"
          fi

      - name: Run npm security audit
        id: npm-audit
        shell: bash
        run: |
          set +e
          set -o pipefail
          npm run --silent audit:security | tee npm-audit.json
          audit_exit=${PIPESTATUS[0]}
          set -e

          echo "exit-code=$audit_exit" >> "$GITHUB_OUTPUT"
          exit "$audit_exit"

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-audit-report
          path: npm-audit.json
          if-no-files-found: warn
          retention-days: 14

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Run architecture tests
        run: npm run test:architecture

      - name: Build
        run: npm run build

      - name: Read project version
        id: project-version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid VERSION format: expected X.Y.Z" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        with:
          args: >-
            -Dsonar.projectVersion=${{ steps.project-version.outputs.version }}
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}